name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "viewer/**"
      - "out/phase2_arbitrum_gov_summary.json"
      - "out/phase2_arbitrum_gov.graph.json"
      - "out/phase2_arbitrum_gov_report.md"
      - "index.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static site bundle
        run: |
          set -euo pipefail
          mkdir -p site/viewer site/out
          cp -R viewer/* site/viewer/
          cp index.html site/index.html
          cp out/phase2_arbitrum_gov_summary.json site/out/
          cp out/phase2_arbitrum_gov.graph.json site/out/
          cp out/phase2_arbitrum_gov_report.md site/out/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

