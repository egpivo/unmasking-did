name: Preview Artifact

on:
  pull_request:
    paths:
      - "viewer/**"
      - "out/arbitrum_gov_summary.json"
      - "out/arbitrum_gov.graph.json"
      - "out/arbitrum_gov_report.md"
      - "index.html"
      - ".github/workflows/preview.yml"

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build preview bundle
        run: |
          set -euo pipefail
          mkdir -p site/viewer site/out
          cp -R viewer/* site/viewer/
          cp index.html site/index.html
          cp out/arbitrum_gov_summary.json site/out/
          cp out/arbitrum_gov.graph.json site/out/
          cp out/arbitrum_gov_report.md site/out/

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-viewer-preview
          path: site

